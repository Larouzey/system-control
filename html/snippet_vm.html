<div class="storage-card">
    <div class="card-head">
        <span class="disk-name">ID: {{vmid}} | {{name}}</span>
        <span class="usage-tag" style="color:{{status_color}}">{{status}}</span>
    </div>
    <div class="usage-track"><div class="usage-fill" style="width:{{cpu}}%"></div></div>
    <p style="font-size:12px; margin:5px 0;">CPU: {{cpu}}% | Mem: {{mem_mb}} MB</p>
</div>
