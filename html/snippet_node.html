<div class="storage-card">
    <div class="card-head">
        <span class="disk-name">🖥️ {{name}} ({{status}})</span>
        <span class="usage-tag">Uptime: {{uptime}}</span>
    </div>
    <div class="usage-track"><div class="usage-fill" style="width:{{cpu}}%"></div></div>
    <p style="font-size:12px; margin:5px 0;">CPU: {{cpu}}% | Mem: {{mem_gb}} GB / {{maxmem_gb}} GB</p>
</div>
