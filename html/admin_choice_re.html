<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <style>

        a.btn.btn-outline.custom-admin-btn{
            border-color: rgba(0, 212, 255, 0.5); 
            color: var(--primary);
        }

        a.btn.btn-outline.custom-admin-btn:hover{
            background:#18FB14;
            color:black;
        }
    </style>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>系统授权 - 终端访问</title>
    <link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>
    <div class="container">
        <h2 style="color:#f8fafc;" >安全终端授权</h2>
        <p>系统已锁定，请选择您的访问凭证级别：</p>

        <div class="btn-group">
            
            <a href="/admin_login_temp" class="btn btn-outline custom-admin-btn"  >
                <strong>⏳ 临时会话 (Temp Auth)</strong>
                <span>仅需 Google 动态验证码，1小时后自动销毁</span>
            </a>
            
            <a href="/admin_login_perm" class="btn btn-primary">
                <strong>🛡️ 深度信任 (Perm Auth)</strong>
                <span>验证码 + 管理员密钥，当前设备免验 365 天</span>
            </a>
            
            <a href="/" class="btn btn-outline custom-admin-btn" style="margin-top: 10px;">
                <strong>← 终止认证并返回</strong>
            </a>

        </div>
    </div>
</body>
</html>
